---
layout: default
---
<article class="post">
  <header class="post-header">
    <p class="post-meta">
      <a href="{{ '/blogs/' | relative_url }}">Blog</a>
      / <span class="post-category">{{ page.path | split: '/' | slice: 1, 1 | first | replace: '-', ' ' }}</span>
    </p>
    <h1>{{ page.title }}</h1>
    <p class="post-date">{{ page.date | date: "%B %-d, %Y" }}</p>
    {% if page.tags %}
    <p class="post-tags">
      {% for tag in page.tags %}<span class="tag">{{ tag }}</span>{% endfor %}
    </p>
    {% endif %}
  </header>
  <div class="post-content">
    {{ content }}
  </div>
</article>
